<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ</title>
    <style>
        :root { --bg-color: #060913; --card-bg: #0f1626; --text-color: #f8fafc; --text-muted: #64748b; --border-radius: 6px; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding-top: 80px; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: rgba(6, 9, 19, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-weight: 800; color: #ffffff; }
        .header-home-btn { font-size: 0.85rem; color: var(--text-color); text-decoration: none; border: 1px solid rgba(255, 255, 255, 0.12); padding: 7px 16px; border-radius: var(--border-radius); transition: all 0.3s; }
        .header-home-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.3); }
        main { max-width: 700px; margin: 80px auto; padding: 60px 20px; background: var(--card-bg); border-radius: var(--border-radius); border: 1px solid rgba(255, 255, 255, 0.02); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        h1 { font-size: 1.6rem; margin-bottom: 0px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">ORITA YUKI</div>
        <a href="index.html" class="header-home-btn">メインページに戻る</a>
    </header>
    <main>
        <h1>お知らせ</h1>
    </main>
</body>
</html>
