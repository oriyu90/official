<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折田悠希のサイト</title>
    <style>
        :root {
            --bg-color: #060913;
            --card-bg: #0f1626;
            --text-color: #f8fafc;
            --text-muted: #475569;
            --primary-color: #1d4ed8;
            --accent-color: #6d28d9;
            --border-radius: 6px;
            --transition: cubic-bezier(0.16, 1, 0.3, 1) 0.8s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* 動く背景オブジェクト */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--bg-color) 80%);
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(139, 92, 246, 0.05) 50%, transparent 70%);
            mix-blend-mode: screen;
            will-change: transform, border-radius, opacity;
            transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .bg-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform-origin: center top;
            will-change: transform;
            transition: transform 0.15s linear;
        }

        /* ヘッダー固定 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(6, 9, 19, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .header-home-btn {
            font-size: 0.85rem;
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 7px 16px;
            border-radius: var(--border-radius);
            transition: all 0.3s ease;
        }

        .header-home-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ヒーローセクション */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -1px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s forwards 0.2s;
        }

        .hero p {
            font-size: 1.3rem;
            color: #94a3b8;
            max-width: 600px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s forwards 0.4s;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.8rem;
            color: #64748b;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }

        /* メインコンテンツエリア */
        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 60px 20px 160px 20px;
            position: relative;
            z-index: 2;
        }

        /* ナビゲーションカードグリッド */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
        }

        @media (max-width: 640px) {
            .nav-grid {
                grid-template-columns: 1fr;
            }
            .hero h1 { font-size: 2.8rem; }
            header { padding: 15px 20px; }
        }

        /* スクロール浮き上がり演出 */
        .reveal {
            opacity: 0;
            transform: translateY(50px) scale(0.98);
            transition: var(--transition);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* フォールバック用 */
        .browser-legacy .reveal {
            opacity: 1 !important;
            transform: none !important;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 38px;
            border-radius: var(--border-radius);
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-color);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(59, 130, 246, 0.25);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-desc {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .card-btn {
            align-self: flex-start;
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .card:hover .card-btn {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        .card-notice:hover {
            border-color: rgba(139, 92, 246, 0.3);
        }
        .card-notice:hover .card-btn {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(109, 40, 217, 0.4);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(6px); }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="bg-lines" id="bgLines"></div>
        <div class="bg-blob" id="bgBlob"></div>
    </div>

    <header>
        <div class="logo">ORITA YUKI</div>
        <a href="index.html" class="header-home-btn">メインページ</a>
    </header>

    <section class="hero">
        <h1>こんにちは。</h1>
        <p>ここは折田悠希のサイトです。</p>
        <div class="scroll-hint">SCROLL DOWN</div>
    </section>

    <main>
        <div class="nav-grid">
            <a href="articles.html" class="card reveal">
                <div>
                    <div class="card-title">最新の記事</div>
                    <div class="card-desc">新しく投稿されたニュースやブログなどの記事ページへ移動します。</div>
                </div>
                <div class="card-btn">記事を見る</div>
            </a>

            <a href="profile.html" class="card reveal">
                <div>
                    <div class="card-title">プロフィール</div>
                    <div class="card-desc">折田悠希の生年月日、好きなもの、連絡先などの自己紹介ページです。</div>
                </div>
                <div class="card-btn">詳細を見る</div>
            </a>

            <a href="https://github.com/oriyu90" target="_blank" rel="noopener noreferrer" class="card reveal">
                <div>
                    <div class="card-title">GitHub</div>
                    <div class="card-desc">ソースコードや開発プロジェクトを公開しているGitHubのアカウントです。</div>
                </div>
                <div class="card-btn">外部サイトを開く</div>
            </a>

            <a href="oshirase.html" class="card card-notice reveal">
                <div>
                    <div class="card-title">お知らせ</div>
                    <div class="card-desc">今後の予定や重要なアナウンスを掲載するためのお知らせ用ページです。</div>
                </div>
                <div class="card-btn">ページを開く</div>
            </a>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const userAgent = navigator.userAgent;
            if (/MSIE|Trident/.test(userAgent)) {
                document.documentElement.classList.add("browser-legacy");
            }

            const reveals = document.querySelectorAll('.reveal');
            const bgBlob = document.getElementById('bgBlob');
            const bgLines = document.getElementById('bgLines');
            
            function onScroll() {
                const scrollTop = window.scrollY;
                const windowHeight = window.innerHeight;
                
                const scrollPercent = Math.min(scrollTop / windowHeight, 2);
                
                if (bgBlob) {
                    const scaleX = 1 + scrollPercent * 0.4;
                    const scaleY = 1 + scrollPercent * 0.9;
                    const opacity = Math.max(1 - scrollPercent * 0.3, 0.4);
                    bgBlob.style.transform = `translate(-50%, -50%) scale(${scaleX}, ${scaleY}) rotate(${scrollTop * 0.05}deg)`;
                    bgBlob.style.opacity = opacity;
                }
                
                if (bgLines) {
                    bgLines.style.transform = `translateY(${scrollTop * 0.3}px) scaleY(${1 + scrollPercent * 0.15})`;
                }

                const triggerBottom = windowHeight * 0.85;
                reveals.forEach(reveal => {
                    const revealTop = reveal.getBoundingClientRect().top;
                    if (revealTop < triggerBottom) {
                        reveal.classList.add('active');
                    }
                });
            }

            if (!document.documentElement.classList.contains("browser-legacy")) {
                window.addEventListener('scroll', onScroll);
                onScroll();
            }
        });
    </script>
</body>
</html>
